spring:
  application:
    name: payment-ms



  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: user123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms
          max-retries: 5
        missing-queues-fatal: false
        acknowledge-mode: manual

wallet:
  exchange: payment.exchange
  routing_key: payment.start.command.key
server:
  port: 8081
