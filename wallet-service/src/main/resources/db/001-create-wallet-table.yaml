databaseChangeLog:
  - changeSet:
      id: 001-create-wallet-table
      author: Amin Ramazanov

      changes:
        - createTable:
            tableName: wallets

            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: last_processed_at
                  type: TIMESTAMP

              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

        - createIndex:
            tableName: wallets
            indexName: idx_wallet_user_id

            columns:
              - column:
                  name: user_id